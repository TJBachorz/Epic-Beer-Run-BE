name: Keep Alive

on:
  workflow_dispatch:
  schedule:
    # Mon-Fri, noon to midnight UTC = 8am-8pm ET / 5am-5pm PT (daylight time)
    - cron: '*/15 12-23 * * 1-5'
    # Tue-Sat, midnight to 2am UTC = covers Fri 6pm PST / 7pm PDT West Coast close
    - cron: '*/15 0-2 * * 2-6'

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: curl -sf https://epic-beer-run-be.onrender.com/health || true
