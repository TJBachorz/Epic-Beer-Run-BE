services:
  - type: web
    name: epic-beer-run-be
    env: ruby
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec puma -C config/puma.rb"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: epic-beer-run-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: RAILS_SKIP_ASSET_COMPILATION
        value: "true"

databases:
  - name: epic-beer-run-db
    databaseName: epic_beer_run
    user: epic_beer_run
    plan: free
